<!DOCTYPE html>
<html>
<head>
    <title>PCB Defect Detection</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .pass {
            color: green;
        }

        .defect {
            color: red;
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>PCB Defect Detection</h2>

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div class="result">
            Result:
            <span class="{% if 'PASS' in result %}pass{% else %}defect{% endif %}">
                {{ result }}
            </span>
        </div>

        <div>
            Confidence: {{ confidence }}%
        </div>

        <img src="{{ img_path }}" width="250">
    {% endif %}
</div>

</body>
</html>
